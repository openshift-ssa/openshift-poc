site_name: OpenShift PoC
site_description: Prerequisites and installation instructions for OpenShift on-premise environments
site_url: https://openshift-ssa.github.io/openshift-poc

theme:
  name: material
  logo: assets/images/openshift.png
  favicon: assets/images/openshift.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Prerequisites:
      - Overview: prerequisites/index.md
      - Infrastructure: prerequisites/infrastructure.md
      - Networking: prerequisites/networking.md
      - DNS: prerequisites/dns.md
      - Load Balancer: prerequisites/load-balancer.md
      - Storage: prerequisites/storage.md
  - Installation:
      - Overview: installation/index.md
      - Installer Provisioned: installation/ipi.md
      - User Provisioned: installation/upi.md
      - Agent Based: installation/agent-based.md
  - Post-Installation:
      - Overview: post-installation/index.md
      - Day 2 Operations: post-installation/day2.md
