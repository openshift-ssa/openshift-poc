site_name: OpenShift POC
site_description: Prerequisites and installation instructions for OpenShift on-premise environments
site_url: https://openshift-ssa.github.io/openshift-poc

theme:
  name: material
  logo: assets/images/openshift.png
  favicon: assets/images/openshift.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search
  - privacy:
      links_attr_map:
        target: _blank

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - mdx_truly_sane_lists

nav:
  - Home: index.md
  - Prerequisites:
      - Overview: prerequisites/index.md
      - Infrastructure: prerequisites/infrastructure.md
      - Networking: prerequisites/networking.md
      - DNS: prerequisites/dns.md
      - Storage: prerequisites/storage.md
      - Installation Host: prerequisites/installation-host.md
  - Fleet Management:
      - Overview: fleet-management/index.md
      - Hub Install (SNO): fleet-management/sno-hub.md
      - Hub Storage: fleet-management/hub-storage.md
      - Advanced Cluster Management: fleet-management/acm.md
  - Standalone Cluster:
      - Overview: standalone/index.md
      - Assisted Installer: standalone/assisted-installer.md
      - Agent-Based Installer: standalone/agent-based.md
      - Troubleshooting: standalone/troubleshooting.md
  - Post-Installation:
      - Overview: post-installation/index.md
      # required
      - NMState Operator: post-installation/nmstate.md
      - Storage: post-installation/storage.md
      - Registry: post-installation/registry.md
      # optional
      - Networking: post-installation/networking.md
      - External Secrets Operator: post-installation/external-secrets-operator.md
      - Workload Availability: post-installation/workload-availability.md
      - Virtualization: post-installation/virtualization.md
      - OpenShift GitOps: post-installation/openshift-gitops.md
      - MultiCluster Observability: post-installation/multicluster-observability.md
      - POC Banner: post-installation/poc-banner.md
  - Workloads: 
      - Overview: workloads/index.md
      - Deploying Containers: workloads/workload-containers.md
      - Deploying Virtual Machines: workloads/workload-virtual-machines.md
  - Operations:
      - Overview: operations/index.md
      - Add Worker Node: operations/add-worker-node.md
      - Rotate SSH Keys: operations/rotate-ssh-keys.md
      - Machine Config: operations/machine-config.md
      
      
